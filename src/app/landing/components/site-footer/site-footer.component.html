<footer class="border-t border-white/10 bg-black py-12">
  <div class="mx-auto flex max-w-6xl flex-col gap-10 px-4 sm:px-6 lg:flex-row lg:justify-between lg:px-8">
    <div>
      <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:gap-4">
        <span
          class="inline-flex shrink-0 items-center justify-center rounded-md bg-white p-1.5 ring-2 ring-orange-500/35"
        >
          <img
            [src]="site.logoSrc"
            [alt]="site.name"
            width="160"
            height="53"
            class="h-10 w-auto max-w-[6.5rem] object-contain sm:h-12 sm:max-w-[8rem]"
            decoding="async"
          />
        </span>
        <p class="font-display text-2xl tracking-tight text-white uppercase">{{ site.name }}</p>
      </div>
      <p class="mt-2 max-w-sm text-sm text-neutral-500">{{ site.description }}</p>
      <p class="mt-4 text-sm text-neutral-400">
        {{ site.address.street }} · {{ site.address.cityLine }}
      </p>
    </div>
    <div class="flex flex-wrap gap-8">
      <div>
        <p class="text-xs font-semibold uppercase tracking-wider text-neutral-500">Navegação</p>
        <ul class="mt-3 space-y-2 text-sm">
          @for (link of navLinks; track link.fragment) {
            <li>
              <a class="text-neutral-400 hover:text-orange-300" [href]="'#' + link.fragment">{{
                link.label
              }}</a>
            </li>
          }
        </ul>
      </div>
      <div>
        <p class="text-xs font-semibold uppercase tracking-wider text-neutral-500">Redes</p>
        <ul class="mt-3 space-y-2 text-sm">
          <li>
            <a
              class="text-neutral-400 hover:text-orange-300"
              [href]="site.instagramUrl"
              target="_blank"
              rel="noopener noreferrer"
              >Instagram</a
            >
          </li>
          <li>
            <a
              class="text-neutral-400 hover:text-orange-300"
              [href]="site.whatsappUrl"
              target="_blank"
              rel="noopener noreferrer"
              >WhatsApp</a
            >
          </li>
        </ul>
      </div>
    </div>
  </div>
  <div
    class="mx-auto mt-10 max-w-6xl border-t border-white/5 px-4 pt-8 text-center text-xs text-neutral-600 sm:px-6 lg:px-8"
  >
    <p>Copyright © {{ year }} {{ site.shortName }} · Todos os direitos reservados</p>
  </div>
</footer>
