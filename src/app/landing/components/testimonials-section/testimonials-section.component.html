<section id="depoimentos" class="border-t border-white/10 bg-neutral-950 py-20 sm:py-28">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
    <h2 class="text-center font-display text-4xl tracking-tight text-white uppercase sm:text-5xl">
      Avaliações
    </h2>
    <p class="mx-auto mt-3 max-w-xl text-center text-sm text-neutral-500">
      O que dizem nossos clientes no Google
    </p>

    <div class="mt-12 grid gap-6 lg:grid-cols-3">
      @for (t of testimonials; track t.author) {
        <figure class="flex flex-col rounded-xl border border-white/10 bg-black p-6">
          <div class="flex gap-0.5 text-[#ffb800]" aria-label="Avaliação {{ t.rating }} de 5">
            @for (i of [1, 2, 3, 4, 5]; track i) {
              <span aria-hidden="true">{{ i <= t.rating ? '★' : '☆' }}</span>
            }
          </div>
          <blockquote class="mt-4 flex-1 text-sm leading-relaxed text-neutral-300">“{{ t.quote }}”</blockquote>
          <figcaption class="mt-5 text-sm font-bold uppercase tracking-wider text-white">
            {{ t.author }}
            @if (t.badge) {
              <span class="mt-1 block text-xs font-normal normal-case tracking-normal text-neutral-500">{{
                t.badge
              }}</span>
            }
          </figcaption>
        </figure>
      }
    </div>
  </div>
</section>
