<section id="servicos" class="border-t border-white/10 bg-neutral-950 py-20 sm:py-28">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
    <div class="text-center">
      <h2 class="font-display text-4xl tracking-tight text-white uppercase sm:text-5xl md:text-[2.75rem]">
        Nossos serviços
      </h2>
      <p class="mx-auto mt-5 max-w-2xl text-base text-neutral-400 sm:text-lg">
        O essencial que você espera de uma barbearia de confiança — com o padrão Moraes.
      </p>
    </div>

    <div
      class="mx-auto mt-16 grid max-w-4xl grid-cols-1 gap-5 sm:grid-cols-2 sm:gap-6 lg:mt-20 lg:gap-7 [&>*]:min-h-0"
    >
      @for (item of services; track item.title) {
        <article
          class="group flex h-full min-h-[200px] flex-col justify-center rounded-xl border border-white/10 bg-black/80 px-7 py-9 text-center shadow-lg transition hover:border-[#ffb800]/45 sm:min-h-[220px] sm:px-8 sm:py-10"
        >
          <h3 class="font-display text-xl tracking-tight text-white uppercase sm:text-2xl">
            {{ item.title }}
          </h3>
          @if (item.blurb) {
            <p class="mt-4 text-sm leading-relaxed text-neutral-400 sm:text-[0.95rem]">
              {{ item.blurb }}
            </p>
          }
        </article>
      }
    </div>

    <div class="mt-14 text-center lg:mt-16">
      <a
        class="inline-flex items-center justify-center border-2 border-[#ffb800] bg-transparent px-10 py-3.5 text-sm font-bold uppercase tracking-[0.18em] text-white transition hover:bg-[#ffb800]/15 sm:px-12 sm:py-4 sm:tracking-[0.2em]"
        [href]="site.whatsappUrl"
        target="_blank"
        rel="noopener noreferrer"
        >Consultar valores no WhatsApp</a
      >
    </div>
  </div>
</section>
